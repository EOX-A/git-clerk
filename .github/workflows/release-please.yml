name: Manage releases

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please! 🤖
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        id: release
      - name: Checkout 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # these if statements ensure that a publication only occurs when
        # a new release is created:
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Set up NPM 🔧
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Install dependencies 🔧
        run: npm ci
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Build package 🔧
        run: npm run build --if-present
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Build image 🔧
        run: docker build -t ghcr.io/eox-a/git-clerk:${{ steps.release.outputs.tag_name }} .
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Login ghcr 🔧
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
      - name: Push ghcr 🚀
        run: docker push ghcr.io/eox-a/git-clerk:${{ steps.release.outputs.tag_name }}
        if: ${{ fromJSON(steps.release.outputs.releases_created) }}
