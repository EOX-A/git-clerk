<!doctype html>
<html>
  <head>
    <title>Preview</title>
    <style>
      html,
      body,
      iframe {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      iframe {
        opacity: 0;
      }
      .loader {
        display: grid;
        place-items: center;
        position: absolute;
        width: 100%;
        height: 100%;
      }
      iframe,
      .loader {
        transition: opacity 0.3s ease-in-out;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@eox/ui/dist/style.css"
    />
  </head>
  <body>
    <div class="loader">
      <progress class="circle"></progress>
    </div>
    <iframe
      src="https://opensciencedata.esa.int/stac-browser/#/"
      frameborder="0"
    ></iframe>
    <script>
      let iframeReady;
      let contentProvided;

      const iframeWindow = document.querySelector("iframe").contentWindow;
      // Listen for messages from parent
      window.addEventListener("message", (event) => {
        // STAC Browser is loaded and emitted navigation event
        if (event.data?.navigate && !iframeReady) {
          setTimeout(() => {
            iframeReady = true;
          }, 500);
        }
        // Content from git-clerk
        if (event.data.detail?.id && !contentProvided) {
          contentProvided = event.data.detail;
        }

        if (iframeReady && contentProvided) {
          iframeWindow.postMessage({ data: event.data.detail }, "*");
        }
      });

      // Initially try each half second until the first postMessage goes through
      let initInterval;
      const initContent = () => {
        if (iframeReady && contentProvided) {
          clearInterval(initInterval);

          iframeWindow.postMessage({ data: contentProvided }, "*");
          document.querySelector("iframe").style.opacity = 1;
          document.querySelector("progress").style.opacity = 0;
          return;
        }
      };
      initInterval = setInterval(initContent, 500);
    </script>
  </body>
</html>
